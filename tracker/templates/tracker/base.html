<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Job Tracker{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f6f9; color: #1a1a2e; min-height: 100vh; }
        nav { background: #1a1a2e; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: #e0e0e0; text-decoration: none; font-size: 0.9rem; margin-left: 1.5rem; }
        nav a:hover { color: #fff; }
        nav .brand { color: #fff; font-size: 1.1rem; font-weight: 600; letter-spacing: 0.5px; }
        .container { max-width: 1100px; margin: 2rem auto; padding: 0 1.5rem; }
        .card { background: #fff; border-radius: 12px; padding: 1.5rem; border: 1px solid #e8eaf0; margin-bottom: 1.5rem; }
        .btn { display: inline-block; padding: 0.5rem 1.2rem; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; border: none; text-decoration: none; transition: 0.15s; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #2d2d4e; }
        .btn-danger { background: #fee2e2; color: #991b1b; }
        .btn-danger:hover { background: #fecaca; }
        .btn-secondary { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
        .btn-secondary:hover { background: #e2e8f0; }
        input, select, textarea { width: 100%; padding: 0.6rem 0.9rem; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; font-family: inherit; background: #fff; color: #1a1a2e; margin-top: 0.3rem; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #1a1a2e; }
        label { font-size: 0.85rem; font-weight: 500; color: #475569; }
        .form-group { margin-bottom: 1rem; }
        .messages { margin-bottom: 1rem; }
        .message { padding: 0.75rem 1rem; border-radius: 8px; font-size: 0.875rem; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .badge { display: inline-block; padding: 0.25rem 0.65rem; border-radius: 20px; font-size: 0.75rem; font-weight: 500; }
        .badge-applied { background: #dbeafe; color: #1e40af; }
        .badge-oa { background: #fef9c3; color: #854d0e; }
        .badge-interview { background: #ede9fe; color: #5b21b6; }
        .badge-offered { background: #dcfce7; color: #166534; }
        .badge-rejected { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    {% if user.is_authenticated %}
    <nav>
        <span class="brand">&#128188; Job Tracker</span>
        <div>
            <a href="{% url 'dashboard' %}">Dashboard</a>
            <a href="{% url 'add_application' %}">+ Add</a>
            <a href="{% url 'logout' %}">Logout</a>
        </div>
    </nav>
    {% endif %}

    <div class="container">
        {% if messages %}
        <div class="messages">
            {% for message in messages %}
            <div class="message">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
