{% extends 'tracker/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="font-size: 1.4rem; font-weight: 600; margin-bottom: 0.3rem;">Welcome back</h2>
        <p style="font-size: 0.875rem; color: #64748b; margin-bottom: 1.5rem;">Track your placement applications in one place.</p>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            {% if form.errors %}
            <p style="color: #991b1b; font-size: 0.85rem; margin-bottom: 0.75rem;">Invalid username or password.</p>
            {% endif %}
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.7rem;">Login</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; font-size: 0.85rem; color: #64748b;">
            No account? <a href="{% url 'signup' %}" style="color: #1a1a2e; font-weight: 500;">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}
