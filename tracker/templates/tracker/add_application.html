{% extends 'tracker/base.html' %}
{% block title %}Add Application{% endblock %}
{% block content %}
<div style="max-width: 600px; margin: 0 auto;">
    <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
        <a href="{% url 'dashboard' %}" style="color: #64748b; text-decoration: none; font-size: 0.875rem;">&#8592; Back</a>
        <h1 style="font-size: 1.3rem; font-weight: 600;">Add Application</h1>
    </div>
    <div class="card">
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>Company Name</label>
                <input type="text" name="company" required placeholder="e.g. Infosys, TCS, Google">
            </div>
            <div class="form-group">
                <label>Role / Position</label>
                <input type="text" name="role" required placeholder="e.g. Software Engineer Intern">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                <div class="form-group">
                    <label>Status</label>
                    <select name="status">
                        <option value="applied">Applied</option>
                        <option value="oa">OA Received</option>
                        <option value="interview">Interview Scheduled</option>
                        <option value="offered">Offered</option>
                        <option value="rejected">Rejected</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Date Applied</label>
                    <input type="date" name="date_applied" required>
                </div>
            </div>
            <div class="form-group">
                <label>Follow-up Date (optional)</label>
                <input type="date" name="follow_up_date">
            </div>
            <div class="form-group">
                <label>Notes (optional)</label>
                <textarea name="notes" rows="3" placeholder="e.g. Referral from seniors, specific round details..."></textarea>
            </div>
            <div style="display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 0.5rem;">
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save Application</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
